site_name: Automation Team Nheo
site_description: Source of truth for the Nheo Automation Team. Notion is no longer maintained.
site_author: Nheo Automation Team
site_url: https://nheo-docs.pages.dev/

repo_name: Nheo-Docs
repo_url: https://github.com/quanpg03/Nheo-Docs
edit_uri: edit/main/docs/

theme:
  name: material
  palette:
    - scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
    - scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
  font:
    text: Inter
    code: JetBrains Mono
  custom_dir: docs/overrides
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.path
    - navigation.top
    - navigation.instant
    - navigation.instant.progress
    - search.highlight
    - search.suggest
    - search.share
    - content.code.copy
    - content.code.annotate
    - content.action.edit
    - toc.follow
    - header.autohide
  icon:
    repo: fontawesome/brands/github
    edit: material/pencil

extra_css:
  - stylesheets/extra.css

plugins:
  - search:
      lang: en
  - glightbox

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - attr_list
  - md_in_html
  - tables
  - footnotes
  - toc:
      permalink: true

nav:
  - Home: index.md

  - Knowledge Base:
    - knowledge-base/index.md
    - AWS Infrastructure:
      - v2 Active Template: knowledge-base/aws-infrastructure/v2-active.md
      - v1 Historical: knowledge-base/aws-infrastructure/v1-historical.md
      - Team Analysis & Decision Log: knowledge-base/aws-infrastructure/team-analysis-decision-log.md

  - Projects:
    - projects/index.md
    - CLOSRADS:
      - Overview: projects/closrads/overview.md
      - Architecture: projects/closrads/architecture.md
      - Module Reference: projects/closrads/module-reference.md
      - GitHub Actions & CI/CD: projects/closrads/github-actions.md
      - Tests & Coverage: projects/closrads/tests.md
      - Activation Plan: projects/closrads/activation-plan.md
      - Design Decisions: projects/closrads/design-decisions.md
    - OpenClaw:
      - Overview: projects/openclaw/overview.md
      - Operations: projects/openclaw/operations.md
      - Architecture: projects/openclaw/architecture.md
      - Support Playbook: projects/openclaw/support-playbook.md
      - Incidents & Lessons Learned: projects/openclaw/incidents.md
      - Security Audit: projects/openclaw/security-audit.md
      - Compliance Matrix: projects/openclaw/compliance-matrix.md
      - Gap Analysis & Roadmap: projects/openclaw/gap-analysis-roadmap.md

  - SOPs:
    - Overview: sops/README.md
    - How We Work: sops/how-we-work.md
    - Development Process: sops/development-process.md
    - Research Process: sops/research-process.md
    - Documentation Standards: sops/documentation-standards.md

  - Research:
    - research/README.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/quanpg03/Nheo-Docs
  generator: false

copyright: "&copy; Nheo Automation Team — Internal Use Only"
